<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kimi's Channel</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-hover: #047857; --green-light: #ecfdf5;
  --green-glow: rgba(5,150,105,0.15); --red: #ef4444; --amber: #f59e0b;
  --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
  --border: #e2e8f0; --border-light: #f1f5f9;
  --radius-lg: 20px; --radius-md: 14px; --radius-sm: 10px;
  --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  --nav-height: 68px;
}
html { font-size: 16px; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: var(--nav-height);
  -webkit-font-smoothing: antialiased;
  background-image: radial-gradient(ellipse 80% 50% at 50% -20%, #d1fae5 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, #ecfdf5 0%, transparent 50%);
  background-attachment: fixed;
}
.app { max-width: 500px; margin: 0 auto; padding: 20px 16px 0; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.header-left { display: flex; align-items: center; gap: 10px; }
.avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.95rem; color: #fff; flex-shrink: 0; }
.header-title { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; }
.header-date { font-size: 0.75rem; color: var(--muted); }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 500px; height: var(--nav-height);
  background: rgba(255,255,255,0.92); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-light);
  display: flex; align-items: center; justify-content: space-around;
  z-index: 100; padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 0.7rem; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: color 0.2s; padding: 6px 12px; border-radius: 10px;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.nav-item .nav-icon { font-size: 1.3rem; transition: transform 0.2s; }
.nav-item.active { color: var(--green); }
.nav-item.active .nav-icon { transform: scale(1.1); }
.nav-item:active { background: #f1f5f9; }

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* Card */
.card {
  background: var(--card); border-radius: var(--radius-lg);
  padding: 22px 20px; box-shadow: var(--shadow);
  border: 1px solid var(--border-light); margin-bottom: 14px;
}

/* Timer */
.timer-ring-wrap { position: relative; display: inline-block; margin: 8px 0 18px; }
.timer-ring { transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
.timer-ring-fg { fill: none; stroke: var(--green); stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; filter: drop-shadow(0 0 6px rgba(5,150,105,0.3)); }
.timer-ring-fg.active { filter: drop-shadow(0 0 10px rgba(5,150,105,0.5)); }
.timer-display {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 2.4rem; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
}
.timer-display.active { color: var(--green); }
.timer-center { text-align: center; }

.subject-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px 14px; font-size: 0.9rem; outline: none; transition: all 0.25s;
  background: #fafbfc; font-weight: 500; margin-bottom: 12px;
}
.subject-input:focus { border-color: var(--green); background: #fff; box-shadow: 0 0 0 4px var(--green-glow); }
.subject-input::placeholder { color: #cbd5e1; }

.btn-row { display: flex; gap: 8px; justify-content: center; }
.btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 11px 22px;
  border-radius: 24px; font-size: 0.9rem; font-weight: 700; border: none;
  cursor: pointer; transition: all 0.2s; user-select: none; -webkit-tap-highlight-color: transparent;
}
.btn:active:not(:disabled) { transform: scale(0.95); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-green { background: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(5,150,105,0.25); }
.btn-green:hover:not(:disabled) { background: var(--green-hover); }
.btn-amber { background: var(--amber); color: #fff; }
.btn-red { background: #fff; color: var(--red); border: 1.5px solid var(--red); }
.btn-ghost { background: #f1f5f9; color: var(--muted); }
.btn-ghost:hover { background: #e2e8f0; color: var(--text); }

/* Progress bar */
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.progress-label { font-size: 0.8rem; font-weight: 700; width: 36px; flex-shrink: 0; }
.progress-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.progress-fill.green { background: linear-gradient(90deg, #059669, #10b981); }
.progress-fill.blue { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.progress-fill.amber { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.progress-val { font-size: 0.8rem; font-weight: 700; width: 60px; text-align: right; color: var(--muted); white-space: nowrap; }

/* 888 Card */
.triple-progress { margin-bottom: 16px; }
.triple-header { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }

.input-row { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
.input-row label { font-size: 0.8rem; font-weight: 600; white-space: nowrap; color: var(--muted); }
.num-input {
  width: 56px; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 8px 4px; font-size: 0.9rem; text-align: center; font-weight: 700;
  outline: none; background: #fafbfc; transition: all 0.2s;
}
.num-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); background: #fff; }
.unit { font-size: 0.8rem; color: var(--muted); }

.btn-sm {
  padding: 8px 16px; font-size: 0.8rem; font-weight: 700; border-radius: 18px;
  border: none; cursor: pointer; transition: all 0.2s;
  background: var(--green); color: #fff; -webkit-tap-highlight-color: transparent;
}
.btn-sm:active { transform: scale(0.95); }
.btn-sm:hover { background: var(--green-hover); }

/* Diary */
.diary-date { font-size: 0.85rem; font-weight: 700; color: var(--muted); margin-bottom: 12px; }
.diary-textarea {
  width: 100%; min-height: 120px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px; font-size: 0.9rem;
  outline: none; resize: vertical; font-family: inherit; background: #fafbfc;
  transition: all 0.2s;
}
.diary-textarea:focus { border-color: var(--green); box-shadow: 0 0 0 4px var(--green-glow); background: #fff; }
.diary-list { margin-top: 16px; }
.diary-item {
  padding: 14px; border-radius: var(--radius-sm); margin-bottom: 8px;
  background: var(--bg); border: 1px solid var(--border-light);
}
.diary-item-date { font-size: 0.75rem; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
.diary-item-text { font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; }
.diary-item-del {
  background: none; border: none; color: #cbd5e1; cursor: pointer;
  font-size: 1.1rem; float: right; padding: 2px 6px; border-radius: 6px;
}
.diary-item-del:hover { color: var(--red); background: #fef2f2; }
.diary-photo-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
.diary-photo { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-light); }
.diary-photo-wrap { position: relative; display: inline-block; }
.diary-photo-del {
  position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
  background: var(--red); color: #fff; border: none; border-radius: 50%;
  font-size: 12px; cursor: pointer; line-height: 1; display: flex; align-items: center; justify-content: center;
}
.btn-camera {
  display: inline-flex; align-items: center; gap: 4px; padding: 7px 14px;
  border-radius: 16px; font-size: 0.8rem; font-weight: 600; border: 1.5px dashed var(--border);
  background: #fafbfc; color: var(--muted); cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.btn-camera:hover { border-color: var(--green); color: var(--green); }

/* Sleep */
.sleep-card { text-align: center; }
.sleep-row { display: flex; gap: 12px; justify-content: center; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
.sleep-field { text-align: left; }
.sleep-field label { font-size: 0.75rem; font-weight: 700; color: var(--muted); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.sleep-field input {
  width: 130px; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 0.95rem; outline: none; background: #fafbfc; font-weight: 600;
}
.sleep-field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); background: #fff; }
.sleep-result { font-size: 1rem; font-weight: 700; color: var(--green); margin-bottom: 12px; }
.sleep-badge { display: inline-block; padding: 4px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; }
.sleep-badge.good { background: var(--green-light); color: var(--green); }
.sleep-badge.warn { background: #fef3c7; color: #d97706; }
.sleep-badge.bad { background: #fef2f2; color: var(--red); }

/* Daily Summary */
.summary-grid { display: flex; gap: 10px; margin-bottom: 16px; }
.summary-item {
  flex: 1; text-align: center; background: var(--green-light); border-radius: var(--radius-md);
  padding: 16px 8px;
}
.summary-icon { font-size: 1.2rem; margin-bottom: 4px; }
.summary-num { font-size: 1.1rem; font-weight: 800; color: var(--green); }
.summary-label { font-size: 0.68rem; color: var(--muted); margin-top: 2px; font-weight: 600; }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(120px);
  background: #0f172a; color: #fff; padding: 12px 28px; border-radius: 28px;
  font-size: 0.85rem; font-weight: 600; opacity: 0; transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.empty { text-align: center; color: var(--muted); padding: 32px 0; font-size: 0.85rem; }

/* Profile */
.profile-section { margin-bottom: 20px; }
.profile-email { font-size: 0.85rem; color: var(--muted); }
.profile-stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-light); font-size: 0.9rem; }

@media (max-width: 400px) {
  .app { padding: 14px 10px 0; }
  .card { padding: 16px 14px; }
  .timer-display { font-size: 2rem; }
  .btn { padding: 10px 16px; font-size: 0.8rem; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="avatar" id="userAvatar"></div>
      <div>
        <div class="header-title">Kimi's Channel</div>
        <div class="header-date" id="headerDate"></div>
      </div>
    </div>
    <div id="daySummary" style="font-size:0.8rem;font-weight:700;color:var(--green)"></div>
  </div>

  <!-- ===== Timer Panel ===== -->
  <div class="panel active" id="panelTimer">
    <div class="card timer-center">
      <input class="subject-input" id="subject" placeholder="科目名称，如：数学、编程、英语…" autocomplete="off">
      <div class="timer-ring-wrap">
        <svg class="timer-ring" width="190" height="190" viewBox="0 0 210 210">
          <circle class="timer-ring-bg" cx="105" cy="105" r="96"/>
          <circle class="timer-ring-fg" id="timerRing" cx="105" cy="105" r="96"
            stroke-dasharray="603" stroke-dashoffset="603"/>
        </svg>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-green" id="btnStart">▶ 开卷</button>
        <button class="btn btn-amber" id="btnPause" style="display:none">⏸ 暂停</button>
        <button class="btn btn-red" id="btnStop" disabled>⏹ 结束</button>
        <button class="btn btn-ghost" id="btnReset">↻</button>
      </div>
    </div>

    <!-- Today progress -->
    <div class="card">
      <div class="progress-row">
        <span class="progress-label" style="width:auto;flex:1">📖 今日学习</span>
        <span class="progress-val" id="todayStudy">0h 0m</span>
        <span style="font-size:0.75rem;color:var(--muted)">/ 目标 8h</span>
      </div>
      <div class="progress-track"><div class="progress-fill green" id="studyBar" style="width:0%"></div></div>
    </div>

    <!-- Recent sessions -->
    <div class="card" id="recentSessions" style="max-height:260px;overflow-y:auto">
      <div style="font-size:0.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px">📋 近期记录</div>
      <div id="recentList"></div>
    </div>
  </div>

  <!-- ===== 888 Panel ===== -->
  <div class="panel" id="panel888">
    <div class="card">
      <div class="triple-header">📊 今日 8 小时学习计划</div>
      <div class="triple-progress">
        <div class="progress-row">
          <span class="progress-label">😴</span>
          <div class="progress-track"><div class="progress-fill blue" id="barSleep" style="width:0%"></div></div>
          <span class="progress-val" id="valSleep">0h / 8h</span>
        </div>
        <div class="progress-row">
          <span class="progress-label">📖</span>
          <div class="progress-track"><div class="progress-fill green" id="barStudy888" style="width:0%"></div></div>
          <span class="progress-val" id="valStudy888">0h / 8h</span>
        </div>
        <div class="progress-row">
          <span class="progress-label">🎮</span>
          <div class="progress-track"><div class="progress-fill amber" id="barLeisure" style="width:0%"></div></div>
          <span class="progress-val" id="valLeisure">0h / 8h</span>
        </div>
      </div>

      <!-- Sleep input -->
      <div style="border-top:1px solid var(--border-light);padding-top:14px;margin-bottom:14px">
        <div style="font-size:0.8rem;font-weight:700;color:var(--muted);margin-bottom:10px">😴 填写睡眠时间</div>
        <div class="input-row">
          <label>入睡</label>
          <input class="num-input" id="sleepStart" type="time" value="23:00">
          <label style="margin-left:8px">起床</label>
          <input class="num-input" id="sleepEnd" type="time" value="07:00">
        </div>
        <div class="sleep-result" id="sleepCalc" style="margin-top:8px"></div>
        <button class="btn-sm" id="btnSaveSleep">保存睡眠</button>
      </div>

      <!-- Leisure input -->
      <div style="border-top:1px solid var(--border-light);padding-top:14px;margin-bottom:14px">
        <div style="font-size:0.8rem;font-weight:700;color:var(--muted);margin-bottom:10px">🎮 填写休闲时间（含健身/游泳）</div>
        <div class="input-row">
          <input class="num-input" id="leisureHours" type="number" min="0" max="24" value="0" style="width:60px">
          <label>小时</label>
          <input class="num-input" id="leisureMinutes" type="number" min="0" max="59" value="0" style="width:60px">
          <label>分钟</label>
        </div>
        <button class="btn-sm" id="btnSaveLeisure" style="margin-top:8px">保存休闲</button>
      </div>
    </div>

    <!-- Daily summary -->
    <div class="card">
      <div class="triple-header">📅 今日完成情况</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-icon">😴</div>
          <div class="summary-num" id="sumSleep">0h</div>
          <div class="summary-label">睡眠</div>
        </div>
        <div class="summary-item">
          <div class="summary-icon">📖</div>
          <div class="summary-num" id="sumStudy">0h</div>
          <div class="summary-label">学习</div>
        </div>
        <div class="summary-item">
          <div class="summary-icon">🎮</div>
          <div class="summary-num" id="sumLeisure">0h</div>
          <div class="summary-label">休闲</div>
        </div>
      </div>
      <div style="text-align:center;font-size:0.85rem;font-weight:700;color:var(--muted)" id="summaryMsg">今天也要加油哦 💪</div>
    </div>
  </div>

  <!-- ===== Diary Panel ===== -->
  <div class="panel" id="panelDiary">
    <div class="card">
      <div class="diary-date" id="diaryDate"></div>
      <textarea class="diary-textarea" id="diaryText" placeholder="写点什么……"></textarea>
      <div class="diary-photo-row" id="diaryPhotos"></div>
      <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center">
        <button class="btn-camera" id="btnCamera">📷 拍照</button>
        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
        <button class="btn-sm" id="btnSaveDiary">保存日记</button>
      </div>
    </div>
    <div id="diaryList"></div>
  </div>

  <!-- ===== Profile Panel ===== -->
  <div class="panel" id="panelProfile">
    <div class="card">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
        <div class="avatar" id="profileAvatar" style="width:48px;height:48px;font-size:1.3rem"></div>
        <div>
          <div style="font-weight:800;font-size:1.1rem" id="profileName"></div>
          <div class="profile-email" id="profileEmail"></div>
        </div>
      </div>
      <div class="profile-section">
        <div class="profile-stat"><span>累计学习</span><span style="font-weight:700" id="statTotalStudy">-</span></div>
        <div class="profile-stat"><span>累计学习次数</span><span style="font-weight:700" id="statTotalSessions">-</span></div>
        <div class="profile-stat"><span>日记篇数</span><span style="font-weight:700" id="statTotalDiary">-</span></div>
        <div class="profile-stat"><span>8小时达标天数</span><span style="font-weight:700" id="stat888Days">-</span></div>
      </div>
      <button class="btn btn-ghost" id="btnLogout" style="width:100%;margin-top:8px">退出登录</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item active" data-tab="timer">
    <span class="nav-icon">⏱️</span>计时
  </div>
  <div class="nav-item" data-tab="888">
    <span class="nav-icon">📊</span>8小时
  </div>
  <div class="nav-item" data-tab="diary">
    <span class="nav-icon">📝</span>日记
  </div>
  <div class="nav-item" data-tab="profile">
    <span class="nav-icon">👤</span>我的
  </div>
</nav>

<script>
// ── Auth ──
const currentUser = JSON.parse(sessionStorage.getItem('user'));
if (!currentUser) { location.href = 'login.html'; }

// ── Data ──
const STORAGE_KEY = 'kimis-channel-data';
const RING_CIRCUMFERENCE = 2 * Math.PI * 96;

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) return JSON.parse(raw);
  return { sessions: [], diary: [], sleepLog: [], leisureLog: [] };
}
function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

// ── Helpers ──
const AVATAR_COLORS = ['#059669','#3b82f6','#8b5cf6','#e11d48','#ea580c','#0891b2','#7c3aed','#be185d'];
function avatarColor(name) {
  let h = 0; for (let i = 0; i < name.length; i++) h = ((h << 5) - h) + name.charCodeAt(i);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function fmtShort(ms) {
  const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}
function fmtFull(ms) {
  const s = Math.floor(ms / 1000);
  return String(Math.floor(s/3600)).padStart(2,'0') + ':' + String(Math.floor((s%3600)/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
const todayStr = () => new Date().toISOString().slice(0, 10);

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── User init ──
function initUser() {
  const name = currentUser.name || '?';
  const color = avatarColor(name);
  document.querySelectorAll('#userAvatar, #profileAvatar').forEach(el => {
    el.style.background = color;
    el.textContent = name.charAt(0);
  });
  document.getElementById('profileName').textContent = name;
  document.getElementById('profileEmail').textContent = currentUser.email || '';
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'short' });
}
initUser();

// ── Timer ──
let timerInterval = null, pausedMs = 0, phaseStart = null;

function getMs() { return phaseStart ? pausedMs + (Date.now() - phaseStart) : pausedMs; }
function tick() {
  document.getElementById('timerDisplay').textContent = fmtFull(getMs());
  updateRing(getMs());
}
function updateRing(ms) {
  const goal = 8 * 3600 * 1000;
  const pct = goal > 0 ? Math.min(ms / goal, 1) : 0;
  document.getElementById('timerRing').style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - pct);
}
function setTimerUI(running) {
  const d = document.getElementById('timerDisplay'), r = document.getElementById('timerRing');
  d.classList.toggle('active', running); r.classList.toggle('active', running);
  document.getElementById('btnStart').style.display = running ? 'none' : '';
  document.getElementById('btnPause').style.display = running ? '' : 'none';
  document.getElementById('btnStop').disabled = !running;
  document.getElementById('btnReset').disabled = running;
}
function start() {
  phaseStart = Date.now(); timerInterval = setInterval(tick, 200); setTimerUI(true);
}
function pause() {
  if (phaseStart) { pausedMs += Date.now() - phaseStart; phaseStart = null; }
  clearInterval(timerInterval); timerInterval = null; tick(); setTimerUI(false);
}
function stop() {
  if (!phaseStart && pausedMs === 0) return;
  const ms = getMs();
  clearInterval(timerInterval); timerInterval = null;
  const data = load(), now = new Date();
  data.sessions.push({
    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    subject: document.getElementById('subject').value.trim() || '未命名',
    startTime: new Date(now - ms).toISOString(),
    endTime: now.toISOString(),
    duration: Math.round(ms / 1000),
    user_id: currentUser.id,
    user_name: currentUser.name
  });
  save(data);
  saveRemote(data.sessions[data.sessions.length - 1]);
  pausedMs = 0; phaseStart = null; tick(); setTimerUI(false); refreshTimer(); refreshAll();
  toast('✅ 学习记录已保存');
}
function reset() {
  clearInterval(timerInterval); timerInterval = null; pausedMs = 0; phaseStart = null; tick(); setTimerUI(false);
}

document.getElementById('btnStart').addEventListener('click', start);
document.getElementById('btnPause').addEventListener('click', pause);
document.getElementById('btnStop').addEventListener('click', stop);
document.getElementById('btnReset').addEventListener('click', reset);

function refreshTimer() {
  const data = load(), today = todayStr();
  const sec = data.sessions.filter(s => s.startTime.slice(0, 10) === today).reduce((a, s) => a + s.duration, 0);
  document.getElementById('todayStudy').textContent = fmtShort(sec * 1000);
  const pct = Math.min(100, (sec / (8 * 3600)) * 100);
  document.getElementById('studyBar').style.width = pct + '%';

  // Recent sessions
  const sorted = [...data.sessions].sort((a, b) => new Date(b.startTime) - new Date(a.startTime)).slice(0, 10);
  const list = document.getElementById('recentList');
  if (!sorted.length) {
    list.innerHTML = '<div class="empty">还没有学习记录</div>';
  } else {
    const SUBJECT_COLORS = ['#059669','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899'];
    const colorCache = {};
    function getColor(s) {
      if (!colorCache[s]) { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i); colorCache[s] = SUBJECT_COLORS[Math.abs(h) % SUBJECT_COLORS.length]; }
      return colorCache[s];
    }
    list.innerHTML = sorted.map(s => `
      <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;margin-bottom:2px">
        <div style="width:10px;height:10px;border-radius:50%;background:${getColor(s.subject)};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.85rem;font-weight:700">${esc(s.subject)}</div>
          <div style="font-size:0.7rem;color:var(--muted)">${new Date(s.startTime).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <span style="font-size:0.85rem;font-weight:800;color:var(--green)">${fmtShort(s.duration * 1000)}</span>
        <button style="background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:1rem;padding:2px 6px" data-del="${s.id}">×</button>
      </div>
    `).join('');
    list.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => {
      const d = load(); d.sessions = d.sessions.filter(s => s.id !== b.dataset.del); save(d);
      deleteRemoteSession(b.dataset.del);
      refreshTimer(); refreshAll(); toast('已删除');
    }));
  }
}

// ── 888 Plan ──
function refresh888() {
  const data = load(), today = todayStr();
  const studySec = data.sessions.filter(s => s.startTime.slice(0, 10) === today).reduce((a, s) => a + s.duration, 0);

  // Sleep from log
  const sleepEntry = data.sleepLog.find(s => s.date === today);
  const sleepH = sleepEntry ? sleepEntry.hours : 0;

  // Leisure from log
  const leisureEntry = data.leisureLog.find(l => l.date === today);
  const leisureH = leisureEntry ? leisureEntry.hours : 0;

  // Study from timer sessions
  const studyH = studySec / 3600;

  document.getElementById('barSleep').style.width = Math.min(100, (sleepH / 8) * 100) + '%';
  document.getElementById('valSleep').textContent = sleepH.toFixed(1) + 'h / 8h';
  document.getElementById('barStudy888').style.width = Math.min(100, (studyH / 8) * 100) + '%';
  document.getElementById('valStudy888').textContent = studyH.toFixed(1) + 'h / 8h';
  document.getElementById('barLeisure').style.width = Math.min(100, (leisureH / 8) * 100) + '%';
  document.getElementById('valLeisure').textContent = leisureH.toFixed(1) + 'h / 8h';

  document.getElementById('sumSleep').textContent = sleepH.toFixed(1) + 'h';
  document.getElementById('sumStudy').textContent = studyH.toFixed(1) + 'h';
  document.getElementById('sumLeisure').textContent = leisureH.toFixed(1) + 'h';

  const all8 = sleepH >= 8 && studyH >= 8 && leisureH >= 8;
  const any = sleepH > 0 || studyH > 0 || leisureH > 0;
  document.getElementById('summaryMsg').textContent = all8 ? '✨ 今日 8 小时学习计划全部达标！' : any ? '继续加油，你可以的 💪' : '今天也要加油哦 💪';
  document.getElementById('daySummary').textContent = any ? `😴${sleepH.toFixed(0)}h 📖${studyH.toFixed(0)}h 🎮${leisureH.toFixed(0)}h` : '';

  // Sleep calc
  calcSleep();
}

function calcSleep() {
  const s = document.getElementById('sleepStart').value;
  const e = document.getElementById('sleepEnd').value;
  if (!s || !e) { document.getElementById('sleepCalc').textContent = ''; return; }
  const [sh, sm] = s.split(':').map(Number), [eh, em] = e.split(':').map(Number);
  let startMins = sh * 60 + sm, endMins = eh * 60 + em;
  if (endMins <= startMins) endMins += 24 * 60;
  const totalMins = endMins - startMins, h = Math.floor(totalMins / 60), m = totalMins % 60;
  let cls = 'good', label = '良好';
  if (totalMins < 360) { cls = 'bad'; label = '不足'; }
  else if (totalMins < 420) { cls = 'warn'; label = '偏少'; }
  document.getElementById('sleepCalc').innerHTML = `预计睡眠 <b>${h}h ${m}m</b> <span class="sleep-badge ${cls}">${label}</span>`;
}

document.getElementById('sleepStart').addEventListener('change', calcSleep);
document.getElementById('sleepEnd').addEventListener('change', calcSleep);

document.getElementById('btnSaveSleep').addEventListener('click', () => {
  const s = document.getElementById('sleepStart').value;
  const e = document.getElementById('sleepEnd').value;
  if (!s || !e) return toast('请选择入睡和起床时间');
  const [sh, sm] = s.split(':').map(Number), [eh, em] = e.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins <= 0) mins += 24 * 60;
  const data = load(), today = todayStr();
  const idx = data.sleepLog.findIndex(x => x.date === today);
  const entry = { date: today, start: s, end: e, hours: mins / 60 };
  if (idx >= 0) data.sleepLog[idx] = entry; else data.sleepLog.push(entry);
  save(data); refresh888(); refreshAll();
  toast('😴 睡眠时间已保存');
});

document.getElementById('btnSaveLeisure').addEventListener('click', () => {
  const h = parseInt(document.getElementById('leisureHours').value) || 0;
  const m = parseInt(document.getElementById('leisureMinutes').value) || 0;
  const total = h + m / 60;
  if (total === 0) return toast('请输入休闲时间');
  const data = load(), today = todayStr();
  const idx = data.leisureLog.findIndex(x => x.date === today);
  const entry = { date: today, hours: total };
  if (idx >= 0) data.leisureLog[idx] = entry; else data.leisureLog.push(entry);
  save(data); refresh888(); refreshAll();
  toast('🎮 休闲时间已保存');
});

// ── Diary ──
let pendingPhotos = [];

function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 600;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotoPreviews() {
  const container = document.getElementById('diaryPhotos');
  container.innerHTML = pendingPhotos.map((p, i) => `
    <div class="diary-photo-wrap">
      <img class="diary-photo" src="${p}" alt="photo">
      <button class="diary-photo-del" data-idx="${i}">×</button>
    </div>
  `).join('');
  container.querySelectorAll('.diary-photo-del').forEach(b => b.addEventListener('click', () => {
    pendingPhotos.splice(parseInt(b.dataset.idx), 1);
    renderPhotoPreviews();
  }));
}

document.getElementById('btnCamera').addEventListener('click', () => {
  document.getElementById('photoInput').click();
});

document.getElementById('photoInput').addEventListener('change', async (e) => {
  const files = e.target.files;
  if (!files.length) return;
  for (const file of files) {
    const b64 = await compressImage(file);
    pendingPhotos.push(b64);
  }
  renderPhotoPreviews();
  e.target.value = '';
});

function refreshDiary() {
  document.getElementById('diaryDate').textContent = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  const data = load(), today = todayStr();
  const todayEntry = data.diary.find(d => d.date === today);
  document.getElementById('diaryText').value = todayEntry ? todayEntry.text : '';
  pendingPhotos = todayEntry && todayEntry.photos ? [...todayEntry.photos] : [];
  renderPhotoPreviews();

  const list = document.getElementById('diaryList');
  const sorted = [...data.diary].sort((a, b) => b.date.localeCompare(a.date));
  if (!sorted.length) {
    list.innerHTML = '<div class="card"><div class="empty">📝 还没有日记</div></div>';
  } else {
    list.innerHTML = sorted.map(d => `
      <div class="card diary-item">
        <button class="diary-item-del" data-del="${d.id}">×</button>
        <div class="diary-item-date">${d.date}</div>
        <div class="diary-item-text">${esc(d.text)}</div>
        ${d.photos && d.photos.length ? '<div class="diary-photo-row">' + d.photos.map(p => `<img class="diary-photo" src="${p}" alt="photo" style="cursor:pointer" onclick="this.style.position='fixed';this.style.top='50%';this.style.left='50%';this.style.transform='translate(-50%,-50%)';this.style.width='auto';this.style.height='auto';this.style.maxWidth='90vw';this.style.maxHeight='90vh';this.style.zIndex='9999';this.style.objectFit='contain';this.onclick=function(){this.style.display='none'}">`).join('') + '</div>' : ''}
      </div>
    `).join('');
    list.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => {
      const d2 = load(); d2.diary = d2.diary.filter(x => x.id !== b.dataset.del); save(d2);
      refreshDiary(); refreshAll(); toast('日记已删除');
    }));
  }
}

document.getElementById('btnSaveDiary').addEventListener('click', () => {
  const text = document.getElementById('diaryText').value.trim();
  if (!text && !pendingPhotos.length) return toast('请输入日记内容或拍照');
  const data = load(), today = todayStr();
  const idx = data.diary.findIndex(d => d.date === today);
  const entry = {
    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36),
    date: today,
    text: text,
    photos: pendingPhotos
  };
  if (idx >= 0) { data.diary[idx] = entry; } else { data.diary.push(entry); }
  save(data); refreshDiary(); refreshAll();
  toast('✅ 日记已保存');
});

// ── Profile ──
function refreshProfile() {
  const data = load();
  const totalStudy = data.sessions.reduce((a, s) => a + s.duration, 0);
  document.getElementById('statTotalStudy').textContent = fmtShort(totalStudy * 1000);
  document.getElementById('statTotalSessions').textContent = data.sessions.length + ' 次';
  document.getElementById('statTotalDiary').textContent = data.diary.length + ' 篇';

  let starDays = 0;
  const days = {};
  data.sessions.forEach(s => { const d = s.startTime.slice(0, 10); days[d] = days[d] || { study: 0, sleep: 0, leisure: 0 }; days[d].study += s.duration; });
  data.sleepLog.forEach(s => { days[s.date] = days[s.date] || { study: 0, sleep: 0, leisure: 0 }; days[s.date].sleep = s.hours; });
  data.leisureLog.forEach(l => { days[l.date] = days[l.date] || { study: 0, sleep: 0, leisure: 0 }; days[l.date].leisure = l.hours; });
  Object.values(days).forEach(d => { if (d.study / 3600 >= 8 && d.sleep >= 8 && d.leisure >= 8) starDays++; });
  document.getElementById('stat888Days').textContent = starDays + ' 天';
}

document.getElementById('btnLogout').addEventListener('click', () => {
  sessionStorage.clear();
  location.href = 'login.html';
});

// ── Global ──
function esc(s) { const e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
function refreshAll() {
  refreshTimer(); refresh888(); refreshDiary();
  const today = todayStr();
  const data = load();
  const sleepH = (data.sleepLog.find(s => s.date === today) || {}).hours || 0;
  const studyH = data.sessions.filter(s => s.startTime.slice(0, 10) === today).reduce((a, s) => a + s.duration, 0) / 3600;
  const leisureH = (data.leisureLog.find(l => l.date === today) || {}).hours || 0;
  document.getElementById('daySummary').textContent = `😴${sleepH.toFixed(0)}h 📖${studyH.toFixed(0)}h 🎮${leisureH.toFixed(0)}h`;
}

// Init
refreshAll();
