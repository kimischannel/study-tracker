<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kimi's Channel</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #10b981; --green-hover: #34d399; --green-muted: rgba(16,185,129,0.12);
  --green-glow: rgba(16,185,129,0.2); --red: #f87171; --amber: #fbbf24;
  --bg: #09090b; --bg-elevated: #131316; --card: #18181b;
  --text: #fafafa; --text-secondary: #a1a1aa; --muted: #71717a;
  --border: #27272a; --border-subtle: #1f1f23;
  --radius-lg: 16px; --radius-md: 12px; --radius-sm: 8px;
  --shadow: 0 1px 2px rgba(0,0,0,0.3);
  --nav-height: 68px;
}
html { font-size: 16px; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: var(--nav-height);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
}
.app { max-width: 500px; margin: 0 auto; padding: 24px 16px 0; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.header-left { display: flex; align-items: center; gap: 12px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.95rem; color: #fff; flex-shrink: 0; }
.header-title { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }
.header-date { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.02em; }

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 500px; height: var(--nav-height);
  background: rgba(19,19,22,0.94); backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  z-index: 100; padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 0.65rem; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all 0.2s; padding: 6px 14px; border-radius: 10px;
  -webkit-tap-highlight-color: transparent; user-select: none; letter-spacing: 0.03em;
}
.nav-item .nav-icon { font-size: 1.15rem; transition: transform 0.2s; opacity: 0.5; }
.nav-item.active { color: var(--text); }
.nav-item.active .nav-icon { transform: scale(1.05); opacity: 1; }
.nav-item:active { background: var(--border-subtle); }

/* Panels */
.panel { display: none; animation: fadeIn 0.25s ease; }
.panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* Card */
.card {
  background: var(--card); border-radius: var(--radius-lg);
  padding: 22px 20px; box-shadow: var(--shadow);
  border: 1px solid var(--border); margin-bottom: 12px;
}

/* Section label */
.section-label {
  font-size: 0.65rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;
}

/* Timer */
.timer-ring-wrap { position: relative; display: inline-block; margin: 4px 0 16px; }
.timer-ring { transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
.timer-ring-fg { fill: none; stroke: var(--green); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; filter: drop-shadow(0 0 8px rgba(16,185,129,0.4)); }
.timer-ring-fg.active { filter: drop-shadow(0 0 14px rgba(16,185,129,0.6)); }
.timer-display {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 2.3rem; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.03em;
}
.timer-display.active { color: var(--green); }
.timer-center { text-align: center; }

.subject-input {
  width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px 16px; font-size: 0.9rem; outline: none; transition: all 0.2s;
  background: var(--bg-elevated); font-weight: 500; color: var(--text); margin-bottom: 12px;
}
.subject-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-muted); }
.subject-input::placeholder { color: #52525b; }

.btn-row { display: flex; gap: 8px; justify-content: center; }
.btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 10px 20px;
  border-radius: 22px; font-size: 0.85rem; font-weight: 600; border: none;
  cursor: pointer; transition: all 0.15s; user-select: none; -webkit-tap-highlight-color: transparent;
}
.btn:active:not(:disabled) { transform: scale(0.96); }
.btn:disabled { opacity: 0.25; cursor: not-allowed; }
.btn-green { background: var(--green); color: #000; }
.btn-green:hover:not(:disabled) { background: var(--green-hover); }
.btn-amber { background: var(--amber); color: #000; }
.btn-red { background: transparent; color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.btn-red:hover:not(:disabled) { border-color: var(--red); background: rgba(248,113,113,0.08); }
.btn-ghost { background: var(--bg-elevated); color: var(--muted); }
.btn-ghost:hover { background: var(--border); color: var(--text-secondary); }

/* Progress bar */
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.progress-label { font-size: 0.8rem; font-weight: 600; width: 36px; flex-shrink: 0; color: var(--text-secondary); }
.progress-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.progress-fill.green { background: linear-gradient(90deg, #059669, #10b981); }
.progress-fill.blue { background: linear-gradient(90deg, #2563eb, #60a5fa); }
.progress-fill.amber { background: linear-gradient(90deg, #d97706, #fbbf24); }
.progress-val { font-size: 0.78rem; font-weight: 600; width: 60px; text-align: right; color: var(--muted); white-space: nowrap; }

/* 888 Card separator */
.section-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

.input-row { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
.input-row label { font-size: 0.8rem; font-weight: 600; white-space: nowrap; color: var(--text-secondary); }
.num-input {
  width: 56px; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 4px; font-size: 0.9rem; text-align: center; font-weight: 600;
  outline: none; background: var(--bg-elevated); color: var(--text); transition: all 0.2s;
}
.num-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-muted); }
.unit { font-size: 0.8rem; color: var(--muted); }

.btn-sm {
  padding: 7px 16px; font-size: 0.78rem; font-weight: 600; border-radius: 16px;
  border: none; cursor: pointer; transition: all 0.15s;
  background: var(--green); color: #000; -webkit-tap-highlight-color: transparent;
}
.btn-sm:active { transform: scale(0.96); }
.btn-sm:hover { background: var(--green-hover); }

/* Diary */
.diary-date { font-size: 0.8rem; font-weight: 600; color: var(--muted); margin-bottom: 12px; }
.diary-textarea {
  width: 100%; min-height: 120px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 16px; font-size: 0.9rem;
  outline: none; resize: vertical; font-family: inherit; background: var(--bg-elevated); color: var(--text);
  transition: all 0.2s;
}
.diary-textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-muted); }
.diary-textarea::placeholder { color: #52525b; }
.diary-list { margin-top: 12px; }
.diary-item {
  padding: 16px; border-radius: var(--radius-sm); margin-bottom: 6px;
  background: var(--bg-elevated); border: 1px solid var(--border);
}
.diary-item-date { font-size: 0.7rem; color: var(--muted); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.03em; }
.diary-item-text { font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; color: var(--text-secondary); }
.diary-item-del {
  background: none; border: none; color: #52525b; cursor: pointer;
  font-size: 1.1rem; float: right; padding: 2px 6px; border-radius: 6px; transition: all 0.15s;
}
.diary-item-del:hover { color: var(--red); background: rgba(248,113,113,0.08); }
.diary-photo-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
.diary-photo { width: 72px; height: 72px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
.diary-photo-wrap { position: relative; display: inline-block; }
.diary-photo-del {
  position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
  background: var(--red); color: #fff; border: none; border-radius: 50%;
  font-size: 12px; cursor: pointer; line-height: 1; display: flex; align-items: center; justify-content: center;
}
.btn-camera {
  display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px;
  border-radius: 16px; font-size: 0.78rem; font-weight: 600; border: 1px dashed #3f3f46;
  background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.btn-camera:hover { border-color: var(--green); color: var(--green); }

/* Sleep */
.sleep-field { text-align: left; }
.sleep-field label { font-size: 0.7rem; font-weight: 700; color: var(--muted); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
.sleep-field input {
  width: 130px; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 0.95rem; outline: none; background: var(--bg-elevated); color: var(--text); font-weight: 600;
}
.sleep-field input:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-muted); }
.sleep-result { font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; }
.sleep-badge { display: inline-block; padding: 3px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
.sleep-badge.good { background: var(--green-muted); color: var(--green); }
.sleep-badge.warn { background: rgba(251,191,36,0.12); color: var(--amber); }
.sleep-badge.bad { background: rgba(248,113,113,0.12); color: var(--red); }

/* Daily Summary */
.summary-grid { display: flex; gap: 8px; margin-bottom: 16px; }
.summary-item {
  flex: 1; text-align: center; background: var(--bg-elevated); border-radius: var(--radius-md);
  padding: 18px 8px; border: 1px solid var(--border);
}
.summary-icon { font-size: 0.8rem; margin-bottom: 6px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; font-weight: 700; }
.summary-num { font-size: 1.3rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
.summary-label { font-size: 0.65rem; color: var(--muted); margin-top: 3px; font-weight: 500; }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(120px);
  background: #27272a; color: #fafafa; padding: 11px 24px; border-radius: 22px;
  font-size: 0.8rem; font-weight: 600; opacity: 0; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid #3f3f46;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.empty { text-align: center; color: var(--muted); padding: 32px 0; font-size: 0.8rem; }

/* Profile */
.profile-section { margin-bottom: 20px; }
.profile-email { font-size: 0.8rem; color: var(--muted); }
.profile-stat { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: var(--text-secondary); }
.profile-stat span:last-child { color: var(--text); }

/* Inline pill */
.inline-pill {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.03em;
  background: var(--green-muted); color: var(--green);
}

/* Recent sessions in timer */
.session-row {
  display: flex; align-items: center; gap: 10px; padding: 10px;
  border-radius: 8px; margin-bottom: 1px; transition: background 0.15s;
}
.session-row:hover { background: var(--bg-elevated); }
.session-row .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.session-row .name { font-size: 0.85rem; font-weight: 600; }
.session-row .time { font-size: 0.7rem; color: var(--muted); }
.session-row .duration { font-size: 0.85rem; font-weight: 700; color: var(--green); }
.session-row .del { background: none; border: none; color: #52525b; cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; }

@media (max-width: 400px) {
  .app { padding: 18px 10px 0; }
  .card { padding: 16px 14px; }
  .timer-display { font-size: 2rem; }
  .btn { padding: 9px 16px; font-size: 0.8rem; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="avatar" id="userAvatar"></div>
      <div>
        <div class="header-title">Kimi's Channel</div>
        <div class="header-date" id="headerDate"></div>
      </div>
    </div>
    <div id="daySummary" style="font-size:0.8rem;font-weight:700;color:var(--green)"></div>
  </div>

  <!-- ===== Timer Panel ===== -->
  <div class="panel active" id="panelTimer">
    <div class="card timer-center">
      <input class="subject-input" id="subject" placeholder="科目名称，如：数学、编程、英语…" autocomplete="off">
      <div class="timer-ring-wrap">
        <svg class="timer-ring" width="190" height="190" viewBox="0 0 210 210">
          <circle class="timer-ring-bg" cx="105" cy="105" r="96"/>
          <circle class="timer-ring-fg" id="timerRing" cx="105" cy="105" r="96"
            stroke-dasharray="603" stroke-dashoffset="603"/>
        </svg>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-green" id="btnStart">Study</button>
        <button class="btn btn-amber" id="btnPause" style="display:none">Pause</button>
        <button class="btn btn-red" id="btnStop" disabled>End</button>
        <button class="btn btn-ghost" id="btnReset">Reset</button>
      </div>
    </div>

    <!-- Today progress -->
    <div class="card">
      <div class="progress-row">
        <span class="progress-label" style="width:auto;flex:1">Today's Study</span>
        <span class="progress-val" id="todayStudy">0h 0m</span>
        <span style="font-size:0.75rem;color:var(--muted)">/ 目标 8h</span>
      </div>
      <div class="progress-track"><div class="progress-fill green" id="studyBar" style="width:0%"></div></div>
    </div>

    <!-- Recent sessions -->
    <div class="card" id="recentSessions" style="max-height:260px;overflow-y:auto">
      <div class="section-label">Recent</div>
      <div id="recentList"></div>
    </div>
  </div>

  <!-- ===== 888 Panel ===== -->
  <div class="panel" id="panel888">
    <div class="card">
      <div class="section-label">8-Hour Plan</div>
      <div class="triple-progress">
        <div class="progress-row">
          <span class="progress-label" style="width:auto">Sleep</span>
          <div class="progress-track"><div class="progress-fill blue" id="barSleep" style="width:0%"></div></div>
          <span class="progress-val" id="valSleep">0h / 8h</span>
        </div>
        <div class="progress-row">
          <span class="progress-label" style="width:auto">Study</span>
          <div class="progress-track"><div class="progress-fill green" id="barStudy888" style="width:0%"></div></div>
          <span class="progress-val" id="valStudy888">0h / 8h</span>
        </div>
        <div class="progress-row">
          <span class="progress-label" style="width:auto">Leisure</span>
          <div class="progress-track"><div class="progress-fill amber" id="barLeisure" style="width:0%"></div></div>
          <span class="progress-val" id="valLeisure">0h / 8h</span>
        </div>
      </div>

      <!-- Sleep input -->
      <div style="border-top:1px solid var(--border-light);padding-top:14px;margin-bottom:14px">
        <div class="section-label">Sleep</div>
        <div class="input-row">
          <label>入睡</label>
          <input class="num-input" id="sleepStart" type="time" value="23:00">
          <label style="margin-left:8px">起床</label>
          <input class="num-input" id="sleepEnd" type="time" value="07:00">
        </div>
        <div class="sleep-result" id="sleepCalc" style="margin-top:8px"></div>
        <button class="btn-sm" id="btnSaveSleep">保存睡眠</button>
      </div>

      <!-- Leisure input -->
      <div style="border-top:1px solid var(--border-light);padding-top:14px;margin-bottom:14px">
        <div class="section-label">Leisure &amp; Fitness</div>
        <div class="input-row">
          <input class="num-input" id="leisureHours" type="number" min="0" max="24" value="0" style="width:60px">
          <label>小时</label>
          <input class="num-input" id="leisureMinutes" type="number" min="0" max="59" value="0" style="width:60px">
          <label>分钟</label>
        </div>
        <button class="btn-sm" id="btnSaveLeisure" style="margin-top:8px">保存休闲</button>
      </div>
    </div>

    <!-- Daily summary -->
    <div class="card">
      <div class="section-label">Today's Summary</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-icon">Sleep</div>
          <div class="summary-num" id="sumSleep">0h</div>
          <div class="summary-label">/ 8h</div>
        </div>
        <div class="summary-item">
          <div class="summary-icon">Study</div>
          <div class="summary-num" id="sumStudy">0h</div>
          <div class="summary-label">/ 8h</div>
        </div>
        <div class="summary-item">
          <div class="summary-icon">Leisure</div>
          <div class="summary-num" id="sumLeisure">0h</div>
          <div class="summary-label">/ 8h</div>
        </div>
      </div>
      <div style="text-align:center;font-size:0.8rem;font-weight:500;color:var(--muted)" id="summaryMsg">Start tracking your day.</div>
    </div>
  </div>

  <!-- ===== Diary Panel ===== -->
  <div class="panel" id="panelDiary">
    <div class="card">
      <div class="diary-date" id="diaryDate"></div>
      <textarea class="diary-textarea" id="diaryText" placeholder="写点什么……"></textarea>
      <div class="diary-photo-row" id="diaryPhotos"></div>
      <div style="margin-top:10px;display:flex;justify-content:space-between;align-items:center">
        <button class="btn-camera" id="btnCamera">Camera</button>
        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
        <button class="btn-sm" id="btnSaveDiary">保存日记</button>
      </div>
    </div>
    <div id="diaryList"></div>
  </div>

  <!-- ===== Profile Panel ===== -->
  <div class="panel" id="panelProfile">
    <div class="card">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
        <div class="avatar" id="profileAvatar" style="width:48px;height:48px;font-size:1.3rem"></div>
        <div>
          <div style="font-weight:800;font-size:1.1rem" id="profileName"></div>
          <div class="profile-email" id="profileEmail"></div>
        </div>
      </div>
      <div class="profile-section">
        <div class="profile-stat"><span>累计学习</span><span style="font-weight:700" id="statTotalStudy">-</span></div>
        <div class="profile-stat"><span>累计学习次数</span><span style="font-weight:700" id="statTotalSessions">-</span></div>
        <div class="profile-stat"><span>日记篇数</span><span style="font-weight:700" id="statTotalDiary">-</span></div>
        <div class="profile-stat"><span>8小时达标天数</span><span style="font-weight:700" id="stat888Days">-</span></div>
      </div>
      <button class="btn btn-ghost" id="btnLogout" style="width:100%;margin-top:8px">退出登录</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item active" data-tab="timer">
    <span class="nav-icon">&#x25CB;</span>计时
  </div>
  <div class="nav-item" data-tab="888">
    <span class="nav-icon">&#x25D0;</span>计划
  </div>
  <div class="nav-item" data-tab="diary">
    <span class="nav-icon">&#x25A7;</span>日记
  </div>
  <div class="nav-item" data-tab="profile">
    <span class="nav-icon">&#x25CE;</span>我的
  </div>
</nav>

<script>
// ── Auth ──
let currentUser = JSON.parse(sessionStorage.getItem('user'));
if (!currentUser) {
  const saved = localStorage.getItem('kimi-remembered-user');
  if (saved) {
    try { currentUser = JSON.parse(saved); sessionStorage.setItem('user', JSON.stringify(currentUser)); } catch(e) {}
  }
}
if (!currentUser) { location.href = 'login.html'; }

// ── Data ──
const STORAGE_KEY = 'kc-data-' + currentUser.id;
const RING_CIRCUMFERENCE = 2 * Math.PI * 96;

// Migrate old data
(function() {
  const oldKeys = ['kimis-channel-data', 'study-tracker-data'];
  oldKeys.forEach(function(ok) {
    if (ok === STORAGE_KEY) return;
    var old = localStorage.getItem(ok);
    if (old) {
      try {
        var oldData = JSON.parse(old);
        var cur = load();
        if (oldData.sessions && oldData.sessions.length > (cur.sessions||[]).length) {
          cur.sessions = oldData.sessions;
        }
        if (oldData.sleepLog && oldData.sleepLog.length > (cur.sleepLog||[]).length) {
          cur.sleepLog = oldData.sleepLog;
        }
        if (oldData.diary && oldData.diary.length > (cur.diary||[]).length) {

const AVATAR_COLORS = ['#059669','#3b82f6','#8b5cf6','#e11d48','#ea580c','#0891b2','#7c3aed','#be185d'];
function avatarColor(name) {
  let h = 0; for (let i = 0; i < name.length; i++) h = ((h << 5) - h) + name.charCodeAt(i);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];

function fmtShort(ms) {
  const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
}
function fmtFull(ms) {
  const s = Math.floor(ms / 1000);
  return String(Math.floor(s/3600)).padStart(2,'0') + ':' + String(Math.floor((s%3600)/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

// ── Timer ──
let timerInterval = null, pausedMs = 0, phaseStart = null;

function getMs() { return phaseStart ? pausedMs + (Date.now() - phaseStart) : pausedMs; }
function tick() {
  document.getElementById('timerDisplay').textContent = fmtFull(getMs());
  updateRing(getMs());
}
function updateRing(ms) {
  const goal = 8 * 3600 * 1000;
  const pct = goal > 0 ? Math.min(ms / goal, 1) : 0;
  document.getElementById('timerRing').style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - pct);
}
function setTimerUI(running) {
  const d = document.getElementById('timerDisplay'), r = document.getElementById('timerRing');
  d.classList.toggle('active', running); r.classList.toggle('active', running);
  document.getElementById('btnStart').style.display = running ? 'none' : '';
  document.getElementById('btnPause').style.display = running ? '' : 'none';
  document.getElementById('btnStop').disabled = !running;
  document.getElementById('btnReset').disabled = running;
}
function start() {
  phaseStart = Date.now(); timerInterval = setInterval(tick, 200); setTimerUI(true);
}
function pause() {
  if (phaseStart) { pausedMs += Date.now() - phaseStart; phaseStart = null; }
  clearInterval(timerInterval); timerInterval = null; tick(); setTimerUI(false);
}
function stop() {
  if (!phaseStart && pausedMs === 0) return;
  const ms = getMs();
  clearInterval(timerInterval); timerInterval = null;
  const data = load(), now = new Date();
  data.sessions.push({
    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    subject: document.getElementById('subject').value.trim() || '未命名',
    startTime: new Date(now - ms).toISOString(),
    endTime: now.toISOString(),
    duration: Math.round(ms / 1000),
    user_id: currentUser.id,
    user_name: currentUser.name
  });
  save(data);
  saveRemote(data.sessions[data.sessions.length - 1]);
  pausedMs = 0; phaseStart = null; tick(); setTimerUI(false); refreshTimer(); refreshAll();
  toast('Session saved');
}
function reset() {
  clearInterval(timerInterval); timerInterval = null; pausedMs = 0; phaseStart = null; tick(); setTimerUI(false);
}

function calcSleep() {
  const s = document.getElementById('sleepStart').value;
  const e = document.getElementById('sleepEnd').value;
  if (!s || !e) { document.getElementById('sleepCalc').textContent = ''; return; }
  const [sh, sm] = s.split(':').map(Number), [eh, em] = e.split(':').map(Number);
  let startMins = sh * 60 + sm, endMins = eh * 60 + em;
  if (endMins <= startMins) endMins += 24 * 60;
  const totalMins = endMins - startMins, h = Math.floor(totalMins / 60), m = totalMins % 60;
  let cls = 'good', label = '良好';
  if (totalMins < 360) { cls = 'bad'; label = '不足'; }
  else if (totalMins < 420) { cls = 'warn'; label = '偏少'; }
  document.getElementById('sleepCalc').innerHTML = `预计睡眠 <b>${h}h ${m}m</b> <span class="sleep-badge ${cls}">${label}</span>`;
}

document.getElementById('sleepStart').addEventListener('change', calcSleep);

document.getElementById('btnSaveSleep').addEventListener('click', () => {
  const s = document.getElementById('sleepStart').value;
  const e = document.getElementById('sleepEnd').value;
  if (!s || !e) return toast('请选择入睡和起床时间');
  const [sh, sm] = s.split(':').map(Number), [eh, em] = e.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins <= 0) mins += 24 * 60;
  const data = load(), today = todayStr();
  const idx = data.sleepLog.findIndex(x => x.date === today);
  const entry = { date: today, start: s, end: e, hours: mins / 60 };
  if (idx >= 0) data.sleepLog[idx] = entry; else data.sleepLog.push(entry);
  save(data); refresh888(); refreshAll();
  toast('Sleep saved');
});

let pendingPhotos = [];

function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 600;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

        if (dp.length >= 4) {
          var dix = data.diary.findIndex(function(x) { return x.id === dp[2]; });
          var de = { id: dp[2], date: dp[1], text: dp.slice(3).join('|') };
          if (dix >= 0) {
            // Only overwrite if local text is empty (remote might be newer)
            if (!data.diary[dix].text) data.diary[dix] = de;
          } else { data.diary.push(de); }
        }
      } else if (!localIds[r.id]) {
        // Regular session
        data.sessions.push({ id: r.id, subject: r.subject, startTime: r.start_time, endTime: r.end_time, duration: r.duration, user_id: r.user_id, user_name: currentUser.name });
      }
    });
    save(data); refreshAll();
  }).catch(function(e) { console.error('[sync] fetch error:', e); });
})();

// ── 9 PM Auto Summary ──
(function() {
  function check9pm() {
    const now = new Date();
    if (now.getHours() === 21 && now.getMinutes() === 0) {
      const data = load(), today = todayStr();
      const studyH = data.sessions.filter(s => s.startTime.slice(0, 10) === today).reduce((a, s) => a + s.duration, 0) / 3600;
      const sleepH = (data.sleepLog.find(s => s.date === today) || {}).hours || 0;
      const leisureH = (data.leisureLog.find(l => l.date === today) || {}).hours || 0;
      const all8 = sleepH >= 8 && studyH >= 8 && leisureH >= 8;
      toast('9 PM — ' + (all8 ? 'All 8h targets met.' : 'Keep it up tomorrow.'));
    }
  }
  setInterval(check9pm, 60000);
})();
</script>
