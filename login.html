<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — 学习计时</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #059669; --green-hover: #047857; --red: #ef4444;
  --bg: #f8fafc; --card: #fff; --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f8fafc;
  background-image: radial-gradient(ellipse 80% 50% at 50% -20%, #d1fae5 0%, transparent 60%);
  color: var(--text); min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  padding: 24px; -webkit-font-smoothing: antialiased;
}
.login-wrap {
  width: 100%; max-width: 400px; background: var(--card);
  border-radius: 20px; padding: 40px 32px 36px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  border: 1px solid #f1f5f9; text-align: center;
}
.logo {
  width: 64px; height: 64px; border-radius: 18px;
  background: linear-gradient(135deg, #059669, #10b981);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 2rem; margin-bottom: 16px; box-shadow: 0 4px 16px rgba(5,150,105,0.25);
}
.login-wrap h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.03em; }
.login-wrap .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 28px; }

.field { margin-bottom: 16px; text-align: left; }
.field label { font-size: 0.8rem; font-weight: 700; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.field input {
  width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 1rem; outline: none; transition: all 0.2s;
  background: #fafbfc; font-weight: 500; color: var(--text);
}
.field input:focus { border-color: var(--green); box-shadow: 0 0 0 4px rgba(5,150,105,0.1); background: #fff; }

.btn {
  width: 100%; padding: 13px; border-radius: 14px; font-size: 1rem; font-weight: 700;
  border: none; cursor: pointer; transition: all 0.2s; margin-top: 8px; letter-spacing: -0.01em;
}
.btn-primary { background: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(5,150,105,0.25); }
.btn-primary:hover:not(:disabled) { background: var(--green-hover); }
.btn-primary:active:not(:disabled) { transform: scale(0.97); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost {
  background: none; color: var(--muted); font-size: 0.85rem; margin-top: 12px; padding: 8px;
}
.btn-ghost:hover { color: var(--text); }

.error-msg {
  color: var(--red); font-size: 0.85rem; margin-top: 12px; padding: 8px 12px;
  background: #fef2f2; border-radius: 8px; display: none; text-align: center;
}
.success-msg {
  color: var(--green); font-size: 0.85rem; margin-top: 12px; padding: 8px 12px;
  background: #f0fdf4; border-radius: 8px; display: none; text-align: center;
}
#extraFields { display: none; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">&#x1F4D6;</div>
  <h1 id="modeTitle">登录</h1>
  <div class="sub" id="modeSub">使用手机号登录学习计时</div>

  <div class="field">
    <label>手机号</label>
    <input type="tel" id="phone" placeholder="输入手机号" maxlength="11" autocomplete="tel">
  </div>

  <div id="extraFields">
    <div class="field">
      <label>你的名字</label>
      <input type="text" id="name" placeholder="输入你的名字" maxlength="20" autocomplete="name">
    </div>
  </div>

  <div class="field">
    <label>密码</label>
    <input type="password" id="password" placeholder="输入密码（至少4位）" autocomplete="current-password">
  </div>

  <button class="btn btn-primary" id="btnSubmit">登 录</button>
  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>
  <button class="btn btn-ghost" id="btnToggle">还没有账号？点此注册</button>
</div>

<script>
const SUPABASE_URL = 'https://fdldkejfkvcymlzcmeub.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0r9JoiUqOggGX7Cum1gjtQ_WEkBE2Sp';

let mode = 'login';
const $ = id => document.getElementById(id);

console.log('[login] page loaded, mode:', mode);

function getDeviceInfo() {
  var ua = navigator.userAgent;
  if (/iPhone/.test(ua)) return 'iOS | iPhone | ' + (ua.match(/Chrome|Firefox|Safari|Edge\/\d+/)?.[0] || 'Safari');
  if (/iPad/.test(ua)) return 'iPadOS | iPad | ' + (ua.match(/Chrome|Firefox|Safari|Edge\/\d+/)?.[0] || 'Safari');
  if (/Android/.test(ua)) {
    var m = ua.match(/; ([^;)]+)(?=;|\))/);
    return 'Android | ' + (m ? m[1].trim() : 'Phone') + ' | ' + (ua.match(/Chrome|Firefox|Safari|Edge\/\d+/)?.[0] || 'Browser');
  }
  if (/Windows/.test(ua)) return 'Windows | PC | ' + (ua.match(/Chrome|Firefox|Safari|Edge\/\d+/)?.[0] || 'Browser');
  if (/Mac/.test(ua)) return 'macOS | Mac | ' + (ua.match(/Chrome|Firefox|Safari|Edge\/\d+/)?.[0] || 'Safari');
  return 'Unknown | Unknown | Unknown';
}

async function hashPassword(pwd) {
  var data = new TextEncoder().encode(pwd);
  var hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
}

function showError(msg) {
  console.error('[login]', msg);
  $('errorMsg').textContent = msg;
  $('errorMsg').style.display = '';
  $('successMsg').style.display = 'none';
}

function showSuccess(msg) {
  console.log('[login] success:', msg);
  $('successMsg').textContent = msg;
  $('successMsg').style.display = '';
  $('errorMsg').style.display = 'none';
}

function setLoading(loading) {
  var btn = $('btnSubmit');
  btn.disabled = loading;
  if (loading) {
    btn.textContent = '请稍候...';
  } else {
    btn.textContent = mode === 'login' ? '登 录' : '注 册';
  }
}

// Toggle mode
$('btnToggle').addEventListener('click', function() {
  mode = mode === 'login' ? 'register' : 'login';
  console.log('[login] switched to mode:', mode);
  $('modeTitle').textContent = mode === 'login' ? '登录' : '注册';
  $('modeSub').textContent = mode === 'login' ? '使用手机号登录学习计时' : '创建账号开始记录学习';
  $('btnSubmit').textContent = mode === 'login' ? '登 录' : '注 册';
  $('btnToggle').textContent = mode === 'login' ? '还没有账号？点此注册' : '已有账号？点此登录';
  $('extraFields').style.display = mode === 'register' ? '' : 'none';
  $('errorMsg').style.display = 'none';
  $('successMsg').style.display = 'none';
});

// Submit
$('btnSubmit').addEventListener('click', async function() {
  var phone = $('phone').value.trim();
  var password = $('password').value;
  var name = $('name').value.trim();

  $('errorMsg').style.display = 'none';
  $('successMsg').style.display = 'none';

  if (!phone || phone.length < 11) { showError('请输入正确的手机号（11位）'); return; }
  if (!password || password.length < 4) { showError('密码至少4位'); return; }
  if (mode === 'register' && !name) { showError('请输入你的名字'); return; }

  setLoading(true);
  console.log('[login] submit started, mode:', mode, 'phone:', phone);

  try {
    if (mode === 'register') {
      // Check if phone taken
      console.log('[login] checking phone...');
      var checkUrl = SUPABASE_URL + '/rest/v1/users?phone=eq.' + encodeURIComponent(phone) + '&select=id&limit=1';
      var checkRes = await fetch(checkUrl, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      console.log('[login] check status:', checkRes.status);

      if (!checkRes.ok) {
        var errText = await checkRes.text();
        console.error('[login] check error:', errText);
        throw new Error('网络错误，请检查连接');
      }

      var existing = await checkRes.json();
      console.log('[login] existing:', existing.length);
      if (existing.length > 0) { showError('该手机号已注册，请直接登录'); setLoading(false); return; }

      // Register
      var pHash = await hashPassword(password);
      var deviceInfo = getDeviceInfo();
      var body = JSON.stringify({ phone: phone, name: name, password_hash: pHash, device_info: deviceInfo });
      console.log('[login] registering, body length:', body.length);

      var regRes = await fetch(SUPABASE_URL + '/rest/v1/users', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'return=representation'
        },
        body: body
      });
      console.log('[login] register status:', regRes.status);

      if (!regRes.ok) {
        var regErr = await regRes.text();
        console.error('[login] register error:', regErr);
        throw new Error('注册失败（HTTP ' + regRes.status + '）');
      }

      var users = await regRes.json();
      console.log('[login] register ok, user id:', users[0].id);
      showSuccess('注册成功，正在跳转...');
      sessionStorage.setItem('user', JSON.stringify(users[0]));
      setTimeout(function() { location.href = 'index.html'; }, 500);
    } else {
      // Login
      console.log('[login] logging in...');
      var loginUrl = SUPABASE_URL + '/rest/v1/users?phone=eq.' + encodeURIComponent(phone) + '&select=*&limit=1';
      var loginRes = await fetch(loginUrl, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      console.log('[login] login status:', loginRes.status);

      if (!loginRes.ok) {
        var loginErr = await loginRes.text();
        console.error('[login] login error:', loginErr);
        throw new Error('网络错误，请检查连接');
      }

      var users = await loginRes.json();
      console.log('[login] users found:', users.length);

      if (users.length === 0) { showError('账号不存在，请先注册'); setLoading(false); return; }

      var pHash = await hashPassword(password);
      console.log('[login] hash comparison, expected:', users[0].password_hash.substring(0,10) + '...', 'got:', pHash.substring(0,10) + '...');

      if (pHash !== users[0].password_hash) { showError('密码错误'); setLoading(false); return; }

      console.log('[login] login ok');
      showSuccess('登录成功，正在跳转...');
      sessionStorage.setItem('user', JSON.stringify(users[0]));
      setTimeout(function() { location.href = 'index.html'; }, 500);
    }
  } catch (err) {
    console.error('[login] exception:', err);
    showError('操作失败：' + (err.message || '未知错误，请重试'));
    setLoading(false);
  }
});

// Enter key
$('password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') $('btnSubmit').click();
});
$('phone').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') $('password').focus();
});
$('name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') $('password').focus();
});
</script>
</body>
</html>
